<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ChaChu TV — Live Kriya</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
  <style>
    :root {
      --bg: #0a0a0c;
      --gold: #c9a962;
      --gold-dim: rgba(201, 169, 98, 0.35);
      --text: #f5f0e8;
      --text-muted: rgba(245, 240, 232, 0.65);
      --overlay-bg: rgba(10, 10, 12, 0.45);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: calc(12px + var(--safe-top)) 12px calc(12px + var(--safe-bottom));
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      flex-shrink: 0;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(1rem, 3vw, 1.25rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .live-badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6b6b6b;
      box-shadow: none;
    }

    .live-badge.live::before {
      background: #e85d4c;
      box-shadow: 0 0 8px #e85d4c;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    .live-badge.soon::before {
      background: var(--gold);
      box-shadow: 0 0 8px var(--gold);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    .stage {
      position: relative;
      flex: 1;
      min-height: 0;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .instruction-banner {
      position: absolute;
      left: 50%;
      bottom: 18%;
      transform: translateX(-50%);
      width: min(92%, 640px);
      padding: 14px 20px;
      text-align: center;
      font-size: clamp(1rem, 2.8vw, 1.35rem);
      line-height: 1.45;
      background: var(--overlay-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--gold-dim);
      border-radius: 10px;
      opacity: 0;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .instruction-banner.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .instruction-banner:not(.visible) {
      transform: translateX(-50%) translateY(8px);
    }

    .timer-wrap {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 96px;
      height: 96px;
    }

    .timer-ring {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .timer-ring circle {
      fill: none;
      stroke-width: 4;
    }

    .timer-ring .track {
      stroke: rgba(255, 255, 255, 0.12);
    }

    .timer-ring .progress {
      stroke: var(--gold);
      stroke-linecap: round;
      transition: stroke-dashoffset 0.25s linear;
    }

    .timer-label {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-variant-numeric: tabular-nums;
    }

    .timer-value {
      font-size: 1.35rem;
      letter-spacing: 0.04em;
    }

    .timer-mode {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .breath-visualizer {
      position: absolute;
      left: 16px;
      bottom: 16px;
      width: 72px;
      height: 72px;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .breath-visualizer.active {
      display: flex;
    }

    .breath-circle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      opacity: 0.85;
      animation: breath-cycle var(--breath-duration, 8s) ease-in-out infinite;
    }

    @keyframes breath-cycle {
      0%, 100% { transform: scale(0.55); opacity: 0.5; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    .breath-label {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .gaze-anchor {
      position: absolute;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .gaze-anchor.active {
      display: flex;
    }

    .gaze-anchor.third-eye {
      top: 22%;
      left: 50%;
      transform: translateX(-50%);
    }

    .gaze-anchor.nose {
      top: 38%;
      left: 50%;
      transform: translateX(-50%);
    }

    .gaze-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 16px var(--gold);
      animation: gaze-pulse 3s ease-in-out infinite;
    }

    @keyframes gaze-pulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.35); opacity: 1; }
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
      flex-shrink: 0;
    }

    button {
      pointer-events: auto;
      font: inherit;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--gold-dim);
      background: rgba(201, 169, 98, 0.08);
      color: var(--text);
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: rgba(201, 169, 98, 0.18);
    }

    .debug-panel {
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(201, 169, 98, 0.2);
      background: rgba(20, 20, 24, 0.95);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.72rem;
      line-height: 1.5;
      color: var(--text-muted);
      max-height: 140px;
      overflow-y: auto;
      display: none;
    }

    .debug-panel.open {
      display: block;
    }

    .debug-panel .debug-hint {
      color: rgba(245, 240, 232, 0.45);
      font-style: italic;
      margin-bottom: 6px;
    }

    button.active {
      background: rgba(201, 169, 98, 0.22);
      border-color: var(--gold);
    }

    .waiting {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(0, 0, 0, 0.82);
      z-index: 3;
      text-align: center;
      padding: 24px;
    }

    .waiting.hidden {
      display: none;
    }

    .waiting-status {
      margin: 0;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .waiting-subject {
      margin: 0;
      font-size: clamp(1.1rem, 3.5vw, 1.5rem);
      line-height: 1.4;
      max-width: 420px;
      color: var(--text);
    }

    .waiting-countdown {
      margin: 0;
      font-variant-numeric: tabular-nums;
      font-size: clamp(2rem, 8vw, 3rem);
      letter-spacing: 0.06em;
      color: var(--text);
    }

    .waiting-countdown-label {
      margin: 0;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .waiting-detail {
      margin: 0;
      color: var(--text-muted);
      max-width: 360px;
      line-height: 1.5;
      font-size: 0.9rem;
    }

    .waiting-ok {
      margin: 0;
      font-size: 0.8rem;
      color: rgba(201, 169, 98, 0.7);
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 id="session-title">ChaChu TV</h1>
      <span class="live-badge" id="live-badge">Checking…</span>
    </header>

    <div class="stage" id="stage">
      <video id="video" playsinline autoplay muted controls></video>

      <div class="waiting" id="waiting">
        <p class="waiting-status" id="waiting-status">Connecting</p>
        <p class="waiting-subject" id="waiting-subject"></p>
        <p class="waiting-countdown" id="waiting-countdown" hidden></p>
        <p class="waiting-countdown-label" id="waiting-countdown-label" hidden></p>
        <p class="waiting-detail" id="waiting-detail">Checking stream…</p>
        <p class="waiting-ok" id="waiting-ok">Site is online</p>
      </div>

      <div class="overlay" id="overlay" aria-live="polite">
        <div class="timer-wrap" id="timer-wrap" hidden>
          <svg class="timer-ring" viewBox="0 0 100 100" aria-hidden="true">
            <circle class="track" cx="50" cy="50" r="42"></circle>
            <circle class="progress" id="timer-progress" cx="50" cy="50" r="42"
              stroke-dasharray="263.89" stroke-dashoffset="0"></circle>
          </svg>
          <div class="timer-label">
            <span class="timer-value" id="timer-value">0:00</span>
            <span class="timer-mode" id="timer-mode">hold</span>
          </div>
        </div>

        <div class="instruction-banner" id="instruction"></div>

        <div class="breath-visualizer" id="breath">
          <div class="breath-circle" id="breath-circle"></div>
          <span class="breath-label">breath</span>
        </div>

        <div class="gaze-anchor third-eye" id="gaze-third-eye">
          <div class="gaze-dot"></div>
        </div>
        <div class="gaze-anchor nose" id="gaze-nose">
          <div class="gaze-dot"></div>
        </div>
      </div>

    </div>

    <div class="toolbar">
      <button type="button" id="btn-unmute">Unmute</button>
      <button type="button" id="btn-sync">Sync to stream start</button>
      <button type="button" id="btn-debug">Technical log</button>
    </div>

    <div class="debug-panel" id="debug-panel" aria-label="Technical log"></div>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const DEBUG_URL = params.has('debug');
      const cuesUrl = params.get('cues') || '/kriya/default.json';
      const scheduleUrl = '/schedule.json';
      const streamURL = '/live/livestream.m3u8';
      const CIRC = 2 * Math.PI * 42;
      const POLL_MS = 15000;

      const video = document.getElementById('video');
      const waiting = document.getElementById('waiting');
      const waitingStatus = document.getElementById('waiting-status');
      const waitingSubject = document.getElementById('waiting-subject');
      const waitingCountdown = document.getElementById('waiting-countdown');
      const waitingCountdownLabel = document.getElementById('waiting-countdown-label');
      const waitingDetail = document.getElementById('waiting-detail');
      const waitingOk = document.getElementById('waiting-ok');
      const debugPanel = document.getElementById('debug-panel');
      const btnDebug = document.getElementById('btn-debug');
      const liveBadge = document.getElementById('live-badge');
      const instructionEl = document.getElementById('instruction');
      const timerWrap = document.getElementById('timer-wrap');
      const timerValue = document.getElementById('timer-value');
      const timerMode = document.getElementById('timer-mode');
      const timerProgress = document.getElementById('timer-progress');
      const breath = document.getElementById('breath');
      const breathCircle = document.getElementById('breath-circle');
      const gazeThirdEye = document.getElementById('gaze-third-eye');
      const gazeNose = document.getElementById('gaze-nose');
      const sessionTitle = document.getElementById('session-title');

      let cueSheet = null;
      let schedule = null;
      let syncOffset = 0;
      let lastCueIndex = -1;
      let streamLive = false;
      let countdownTimer = null;
      let debugOpen = DEBUG_URL;
      let hls = null;
      let playerStarted = false;
      let connectStartedAt = 0;
      const CONNECT_TIMEOUT_MS = 15000;

      function log(msg) {
        console.log('[ChaChu TV]', msg);
        if (!debugOpen) return;
        if (debugPanel.querySelector('.debug-hint')) {
          debugPanel.innerHTML = '';
        }
        const line = document.createElement('div');
        line.textContent = new Date().toLocaleTimeString() + ' — ' + msg;
        debugPanel.appendChild(line);
        debugPanel.scrollTop = debugPanel.scrollHeight;
      }

      function setDebugOpen(open) {
        debugOpen = open;
        debugPanel.classList.toggle('open', open);
        btnDebug.classList.toggle('active', open);
        btnDebug.textContent = open ? 'Hide log' : 'Technical log';
        if (open && !debugPanel.children.length) {
          debugPanel.innerHTML = '<div class="debug-hint">Connection and sync events appear here.</div>';
          log('Log opened');
          log('Stream URL: ' + streamURL);
        }
      }

      function formatClock(seconds) {
        const s = Math.max(0, Math.floor(seconds));
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const r = s % 60;
        if (h > 0) {
          return h + ':' + String(m).padStart(2, '0') + ':' + String(r).padStart(2, '0');
        }
        return String(m).padStart(2, '0') + ':' + String(r).padStart(2, '0');
      }

      function formatTime(seconds) {
        const s = Math.max(0, Math.floor(seconds));
        const m = Math.floor(s / 60);
        const r = s % 60;
        return m + ':' + String(r).padStart(2, '0');
      }

      function nextHourlySlot(now) {
        const d = new Date(now);
        d.setMinutes(0, 0, 0);
        if (now >= d.getTime()) {
          d.setHours(d.getHours() + 1);
        }
        return d;
      }

      function slotProgress(now) {
        if (!schedule?.durationSeconds) return null;
        const hourStart = new Date(now);
        hourStart.setMinutes(0, 0, 0);
        const elapsed = (now - hourStart.getTime()) / 1000;
        if (elapsed >= 0 && elapsed < schedule.durationSeconds) {
          return { hourStart, elapsed, remaining: schedule.durationSeconds - elapsed };
        }
        return null;
      }

      function isInBroadcastWindow(now) {
        return slotProgress(now) !== null;
      }

      function setLiveBadge(state, label) {
        liveBadge.textContent = label;
        liveBadge.classList.remove('live', 'soon');
        if (state === 'live') liveBadge.classList.add('live');
        if (state === 'soon') liveBadge.classList.add('soon');
      }

      function showIdleOverlay(mode) {
        const subject = schedule?.subject || cueSheet?.title || 'Guided kriya practice';
        waitingSubject.textContent = subject;

        if (mode === 'live') {
          waiting.classList.add('hidden');
          setLiveBadge('live', 'Live');
          return;
        }

        waiting.classList.remove('hidden');
        const now = Date.now();
        const inSlot = isInBroadcastWindow(now);

        if (mode === 'connecting') {
          waitingStatus.textContent = 'Connecting';
          waitingCountdown.hidden = true;
          waitingCountdownLabel.hidden = true;
          waitingDetail.textContent = 'Joining the live broadcast…';
          setLiveBadge('soon', 'Connecting');
          return;
        }

        // Inside the hourly broadcast window — never show "Next session"
        if (inSlot) {
          const slot = slotProgress(now);
          waitingStatus.textContent = 'On air now';
          waitingCountdown.hidden = false;
          waitingCountdownLabel.hidden = false;
          waitingCountdown.textContent = formatClock(slot.remaining);
          waitingCountdownLabel.textContent = 'remaining in this session';
          waitingDetail.textContent = playerStarted
            ? 'Buffering live stream… tap Unmute if you hear no audio.'
            : 'Stream should be live — connecting…';
          setLiveBadge('soon', 'On air');
          return;
        }

        const next = nextHourlySlot(now);
        const secs = Math.max(0, Math.floor((next.getTime() - now) / 1000));
        waitingStatus.textContent = 'Next session';
        waitingCountdown.hidden = false;
        waitingCountdownLabel.hidden = false;
        waitingCountdown.textContent = formatClock(secs);
        waitingCountdownLabel.textContent = 'until ' + next.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        waitingDetail.textContent = schedule?.note || 'Broadcasts begin at the top of each hour.';
        setLiveBadge('soon', 'Offline');
      }

      function tickCountdown() {
        if (streamLive) return;
        showIdleOverlay(isInBroadcastWindow() ? 'waiting' : 'offline');
      }

      function startCountdownTicker() {
        if (countdownTimer) clearInterval(countdownTimer);
        countdownTimer = setInterval(tickCountdown, 1000);
        tickCountdown();
      }

      async function fetchPlaylistText(url) {
        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.text();
      }

      /** SRS returns a master playlist first; segments live on ?hls_ctx=… URL */
      async function resolveHlsPlaylistUrl() {
        const text = await fetchPlaylistText(streamURL);

        if (text.includes('#EXT-X-STREAM-INF')) {
          const variantLine = text.split('\n').find(function (line) {
            return line.trim().startsWith('/live/') || line.trim().includes('hls_ctx=');
          });
          if (variantLine) {
            const resolved = new URL(variantLine.trim(), location.origin).href;
            log('SRS master playlist → ' + resolved);
            const media = await fetchPlaylistText(resolved);
            if (media.includes('#EXTINF') && media.includes('.ts')) {
              return resolved;
            }
            throw new Error('SRS variant has no segments yet');
          }
        }

        if (text.includes('#EXTINF') && text.includes('.ts')) {
          return streamURL;
        }

        throw new Error('No playable HLS segments in playlist');
      }

      async function checkStreamLive() {
        try {
          const text = await fetchPlaylistText(streamURL);
          if (text.includes('#EXT-X-ENDLIST')) {
            log('Stream check: playlist ended');
            return false;
          }
          if (text.includes('#EXT-X-STREAM-INF')) {
            log('Stream check: SRS master playlist (stream available)');
            return true;
          }
          if (text.includes('#EXTINF') && text.includes('.ts')) {
            log('Stream check: media playlist with segments');
            return true;
          }
          log('Stream check: no segments in playlist');
          return false;
        } catch (e) {
          log('Stream check failed: ' + e.message);
          return false;
        }
      }

      function resetPlayer() {
        if (hls) {
          hls.destroy();
          hls = null;
        }
        video.removeAttribute('src');
        video.load();
        playerStarted = false;
        streamLive = false;
        connectStartedAt = 0;
      }

      function activeCueIndex(t) {
        if (!cueSheet?.cues?.length) return -1;
        for (let i = cueSheet.cues.length - 1; i >= 0; i--) {
          if (t >= cueSheet.cues[i].at) return i;
        }
        return -1;
      }

      function applyCue(cue) {
        if (!cue) {
          instructionEl.classList.remove('visible');
          timerWrap.hidden = true;
          breath.classList.remove('active');
          gazeThirdEye.classList.remove('active');
          gazeNose.classList.remove('active');
          return;
        }

        instructionEl.textContent = cue.instruction;
        instructionEl.classList.add('visible');

        if (cue.timer) {
          timerWrap.hidden = false;
          timerMode.textContent = cue.timer.mode === 'countup' ? 'elapsed' : 'remaining';
        } else {
          timerWrap.hidden = true;
        }

        breath.classList.toggle('active', !!cue.breath);
        gazeThirdEye.classList.remove('active');
        gazeNose.classList.remove('active');
        if (cue.gaze === 'third-eye') gazeThirdEye.classList.add('active');
        if (cue.gaze === 'nose') gazeNose.classList.add('active');
      }

      function updateOverlay() {
        if (!cueSheet) return;
        const t = video.currentTime + syncOffset;
        const idx = activeCueIndex(t);
        if (idx !== lastCueIndex) {
          lastCueIndex = idx;
          applyCue(idx >= 0 ? cueSheet.cues[idx] : null);
        }
        const cue = idx >= 0 ? cueSheet.cues[idx] : null;
        if (!cue?.timer) return;

        const elapsed = t - cue.at;
        const total = cue.timer.seconds;
        let display;
        let fraction;

        if (cue.timer.mode === 'countup') {
          display = Math.min(elapsed, total);
          fraction = Math.min(elapsed / total, 1);
        } else {
          display = Math.max(total - elapsed, 0);
          fraction = Math.max(1 - elapsed / total, 0);
        }

        timerValue.textContent = formatTime(display);
        timerProgress.style.strokeDashoffset = String(CIRC * (1 - fraction));
      }

      function setupBreathTiming() {
        const inhale = cueSheet?.breath?.inhaleSeconds ?? 4;
        const exhale = cueSheet?.breath?.exhaleSeconds ?? 4;
        breathCircle.style.setProperty('--breath-duration', (inhale + exhale) + 's');
        breathCircle.style.animationDuration = (inhale + exhale) + 's';
      }

      async function loadSchedule() {
        try {
          const res = await fetch(scheduleUrl, { cache: 'no-store' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          schedule = await res.json();
          if (schedule.title) sessionTitle.textContent = schedule.title;
          log('Loaded schedule');
        } catch (e) {
          schedule = { subject: 'Guided kriya practice', durationSeconds: 2462 };
          log('Schedule unavailable, using defaults');
        }
      }

      async function loadCues() {
        const url = schedule?.cues || cuesUrl;
        try {
          const res = await fetch(url, { cache: 'no-store' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          cueSheet = await res.json();
          if (!schedule?.title && cueSheet.title) {
            sessionTitle.textContent = cueSheet.title;
          }
          setupBreathTiming();
          log('Loaded cues: ' + url);
        } catch (e) {
          log('Cues unavailable (' + url + '): ' + e.message);
          cueSheet = { title: 'ChaChu TV', cues: [] };
        }
      }

      function onStreamReady() {
        streamLive = true;
        showIdleOverlay('live');
        video.play().catch(() => {
          streamLive = false;
          showIdleOverlay(isInBroadcastWindow() ? 'waiting' : 'offline');
          waitingDetail.textContent = 'Tap Unmute to start playback.';
        });
        log('Stream playing');
      }

      async function initHls() {
        if (playerStarted) return;
        playerStarted = true;
        connectStartedAt = Date.now();
        showIdleOverlay('connecting');
        log('Initializing HLS player');

        let sourceUrl = streamURL;
        try {
          sourceUrl = await resolveHlsPlaylistUrl();
        } catch (e) {
          log('Playlist resolve: ' + e.message);
          playerStarted = false;
          connectStartedAt = 0;
          showIdleOverlay(isInBroadcastWindow() ? 'waiting' : 'offline');
          return;
        }

        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
          hls = new Hls({
            debug: DEBUG_URL,
            enableWorker: true,
            lowLatencyMode: true,
            manifestLoadingMaxRetry: 6,
            levelLoadingMaxRetry: 6
          });

          hls.on(Hls.Events.MANIFEST_PARSED, function () {
            onStreamReady();
          });

          hls.on(Hls.Events.ERROR, function (_, data) {
            log('HLS: ' + data.type + ' — ' + data.details + (data.fatal ? ' (fatal)' : ''));
            if (!data.fatal) return;
            streamLive = false;
            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
              showIdleOverlay(isInBroadcastWindow() ? 'waiting' : 'connecting');
              hls.startLoad();
            } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
              hls.recoverMediaError();
            } else {
              resetPlayer();
              showIdleOverlay(isInBroadcastWindow() ? 'waiting' : 'offline');
            }
          });

          hls.loadSource(sourceUrl);
          hls.attachMedia(video);
          return;
        }

        if (video.canPlayType('application/vnd.apple.mpegurl')) {
          log('Using native HLS → ' + sourceUrl);
          video.src = sourceUrl;
          video.addEventListener('loadedmetadata', onStreamReady, { once: true });
          video.addEventListener('error', function () {
            log('Native HLS playback error');
            resetPlayer();
            showIdleOverlay(isInBroadcastWindow() ? 'waiting' : 'offline');
          }, { once: true });
          return;
        }

        playerStarted = false;
        connectStartedAt = 0;
        waitingDetail.textContent = 'This browser cannot play HLS.';
        log('HLS not supported');
      }

      async function ensurePlayer() {
        if (streamLive) return;

        if (playerStarted && connectStartedAt && Date.now() - connectStartedAt > CONNECT_TIMEOUT_MS) {
          log('Connection timeout — retrying player');
          resetPlayer();
        }

        if (playerStarted) return;

        const inSlot = isInBroadcastWindow();
        const live = inSlot ? true : await checkStreamLive();
        if (live) {
          log(inSlot ? 'Broadcast window — starting player' : 'Stream detected — starting player');
          await initHls();
        } else if (!inSlot) {
          showIdleOverlay('offline');
        } else {
          showIdleOverlay('waiting');
        }
      }

      async function pollStream() {
        if (streamLive) return;
        await ensurePlayer();
        if (!streamLive && !playerStarted) {
          showIdleOverlay(isInBroadcastWindow() ? 'waiting' : 'offline');
        }
      }

      document.getElementById('btn-unmute').addEventListener('click', () => {
        video.muted = false;
        video.play().then(() => {
          streamLive = true;
          showIdleOverlay('live');
        }).catch(() => {});
      });

      document.getElementById('btn-sync').addEventListener('click', () => {
        syncOffset = -video.currentTime;
        lastCueIndex = -1;
        log('Synced cues to current stream position');
        updateOverlay();
      });

      btnDebug.addEventListener('click', () => {
        setDebugOpen(!debugOpen);
      });

      video.addEventListener('timeupdate', updateOverlay);

      (async function boot() {
        log('Page loaded');
        await loadSchedule();
        await loadCues();
        startCountdownTicker();
        await ensurePlayer();
        setInterval(pollStream, POLL_MS);
        if (DEBUG_URL) setDebugOpen(true);
      })();
    })();
  </script>
</body>
</html>
