<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ChaChu TV — Live Kriya</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
  <style>
    :root {
      --bg: #0a0a0c;
      --gold: #c9a962;
      --gold-dim: rgba(201, 169, 98, 0.35);
      --text: #f5f0e8;
      --text-muted: rgba(245, 240, 232, 0.65);
      --overlay-bg: rgba(10, 10, 12, 0.45);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: calc(12px + var(--safe-top)) 12px calc(12px + var(--safe-bottom));
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      flex-shrink: 0;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(1rem, 3vw, 1.25rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .live-badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6b6b6b;
      box-shadow: none;
    }

    .live-badge.live::before {
      background: #e85d4c;
      box-shadow: 0 0 8px #e85d4c;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    .live-badge.soon::before {
      background: var(--gold);
      box-shadow: 0 0 8px var(--gold);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    .stage {
      position: relative;
      flex: 1;
      min-height: 0;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .instruction-banner {
      position: absolute;
      left: 50%;
      bottom: 18%;
      transform: translateX(-50%);
      width: min(92%, 640px);
      padding: 14px 20px;
      text-align: center;
      font-size: clamp(1rem, 2.8vw, 1.35rem);
      line-height: 1.45;
      background: var(--overlay-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--gold-dim);
      border-radius: 10px;
      opacity: 0;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .instruction-banner.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .instruction-banner:not(.visible) {
      transform: translateX(-50%) translateY(8px);
    }

    .timer-wrap {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 96px;
      height: 96px;
    }

    .timer-ring {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .timer-ring circle {
      fill: none;
      stroke-width: 4;
    }

    .timer-ring .track {
      stroke: rgba(255, 255, 255, 0.12);
    }

    .timer-ring .progress {
      stroke: var(--gold);
      stroke-linecap: round;
      transition: stroke-dashoffset 0.25s linear;
    }

    .timer-label {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-variant-numeric: tabular-nums;
    }

    .timer-value {
      font-size: 1.35rem;
      letter-spacing: 0.04em;
    }

    .timer-mode {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .breath-visualizer {
      position: absolute;
      left: 16px;
      bottom: 16px;
      width: 72px;
      height: 72px;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .breath-visualizer.active {
      display: flex;
    }

    .breath-circle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      opacity: 0.85;
      animation: breath-cycle var(--breath-duration, 8s) ease-in-out infinite;
    }

    @keyframes breath-cycle {
      0%, 100% { transform: scale(0.55); opacity: 0.5; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    .breath-label {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .gaze-anchor {
      position: absolute;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .gaze-anchor.active {
      display: flex;
    }

    .gaze-anchor.third-eye {
      top: 22%;
      left: 50%;
      transform: translateX(-50%);
    }

    .gaze-anchor.nose {
      top: 38%;
      left: 50%;
      transform: translateX(-50%);
    }

    .gaze-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 16px var(--gold);
      animation: gaze-pulse 3s ease-in-out infinite;
    }

    @keyframes gaze-pulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.35); opacity: 1; }
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
      flex-shrink: 0;
    }

    button {
      pointer-events: auto;
      font: inherit;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--gold-dim);
      background: rgba(201, 169, 98, 0.08);
      color: var(--text);
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: rgba(201, 169, 98, 0.18);
    }

    .debug-panel {
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(201, 169, 98, 0.2);
      background: rgba(20, 20, 24, 0.95);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.72rem;
      line-height: 1.5;
      color: var(--text-muted);
      max-height: 140px;
      overflow-y: auto;
      display: none;
    }

    .debug-panel.open {
      display: block;
    }

    .debug-panel .debug-hint {
      color: rgba(245, 240, 232, 0.45);
      font-style: italic;
      margin-bottom: 6px;
    }

    button.active {
      background: rgba(201, 169, 98, 0.22);
      border-color: var(--gold);
    }

    .waiting {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(0, 0, 0, 0.82);
      z-index: 3;
      text-align: center;
      padding: 24px;
    }

    .waiting.hidden {
      display: none;
    }

    .waiting-status {
      margin: 0;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .waiting-subject {
      margin: 0;
      font-size: clamp(1.1rem, 3.5vw, 1.5rem);
      line-height: 1.4;
      max-width: 420px;
      color: var(--text);
    }

    .waiting-countdown {
      margin: 0;
      font-variant-numeric: tabular-nums;
      font-size: clamp(2rem, 8vw, 3rem);
      letter-spacing: 0.06em;
      color: var(--text);
    }

    .waiting-countdown-label {
      margin: 0;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .waiting-detail {
      margin: 0;
      color: var(--text-muted);
      max-width: 360px;
      line-height: 1.5;
      font-size: 0.9rem;
    }

    .waiting.in-slot {
      background: rgba(0, 0, 0, 0.35);
      pointer-events: none;
    }

    .waiting.in-slot .waiting-detail,
    .waiting.in-slot .waiting-ok {
      pointer-events: auto;
    }

    .waiting-ok {
      margin: 0;
      font-size: 0.8rem;
      color: rgba(201, 169, 98, 0.7);
    }

    .intermission-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 10px;
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid var(--gold-dim);
      background: rgba(201, 169, 98, 0.08);
      flex-shrink: 0;
    }

    .intermission-bar[hidden] {
      display: none !important;
    }

    .intermission-title {
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      color: var(--gold);
    }

    .intermission-countdown {
      font-variant-numeric: tabular-nums;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 id="session-title">ChaChu TV</h1>
      <span class="live-badge" id="live-badge">Checking…</span>
    </header>

    <div class="stage" id="stage">
      <video id="video" playsinline autoplay muted controls></video>

      <div class="waiting" id="waiting">
        <p class="waiting-status" id="waiting-status">Connecting</p>
        <p class="waiting-subject" id="waiting-subject"></p>
        <p class="waiting-countdown" id="waiting-countdown" hidden></p>
        <p class="waiting-countdown-label" id="waiting-countdown-label" hidden></p>
        <p class="waiting-detail" id="waiting-detail">Checking stream…</p>
        <p class="waiting-ok" id="waiting-ok">Site is online</p>
      </div>

      <div class="overlay" id="overlay" aria-live="polite">
        <div class="timer-wrap" id="timer-wrap" hidden>
          <svg class="timer-ring" viewBox="0 0 100 100" aria-hidden="true">
            <circle class="track" cx="50" cy="50" r="42"></circle>
            <circle class="progress" id="timer-progress" cx="50" cy="50" r="42"
              stroke-dasharray="263.89" stroke-dashoffset="0"></circle>
          </svg>
          <div class="timer-label">
            <span class="timer-value" id="timer-value">0:00</span>
            <span class="timer-mode" id="timer-mode">hold</span>
          </div>
        </div>

        <div class="instruction-banner" id="instruction"></div>

        <div class="breath-visualizer" id="breath">
          <div class="breath-circle" id="breath-circle"></div>
          <span class="breath-label">breath</span>
        </div>

        <div class="gaze-anchor third-eye" id="gaze-third-eye">
          <div class="gaze-dot"></div>
        </div>
        <div class="gaze-anchor nose" id="gaze-nose">
          <div class="gaze-dot"></div>
        </div>
      </div>

    </div>

    <div class="intermission-bar" id="intermission-bar" hidden aria-live="polite">
      <span class="intermission-title" id="intermission-title">Intermission</span>
      <span class="intermission-countdown" id="intermission-countdown"></span>
    </div>

    <div class="toolbar">
      <button type="button" id="btn-unmute">Unmute</button>
      <button type="button" id="btn-sync">Sync to video</button>
      <button type="button" id="btn-debug">Technical log</button>
    </div>

    <div class="debug-panel" id="debug-panel" aria-label="Technical log"></div>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const DEBUG_URL = params.has('debug');
      const cuesUrl = params.get('cues') || '/kriya/default.json';
      const scheduleUrl = '/schedule.json';
      const streamURL = '/live/livestream.m3u8';
      const CIRC = 2 * Math.PI * 42;
      const POLL_MS = 15000;

      const video = document.getElementById('video');
      const waiting = document.getElementById('waiting');
      const waitingStatus = document.getElementById('waiting-status');
      const waitingSubject = document.getElementById('waiting-subject');
      const waitingCountdown = document.getElementById('waiting-countdown');
      const waitingCountdownLabel = document.getElementById('waiting-countdown-label');
      const waitingDetail = document.getElementById('waiting-detail');
      const waitingOk = document.getElementById('waiting-ok');
      const debugPanel = document.getElementById('debug-panel');
      const btnDebug = document.getElementById('btn-debug');
      const liveBadge = document.getElementById('live-badge');
      const instructionEl = document.getElementById('instruction');
      const timerWrap = document.getElementById('timer-wrap');
      const timerValue = document.getElementById('timer-value');
      const timerMode = document.getElementById('timer-mode');
      const timerProgress = document.getElementById('timer-progress');
      const breath = document.getElementById('breath');
      const breathCircle = document.getElementById('breath-circle');
      const gazeThirdEye = document.getElementById('gaze-third-eye');
      const gazeNose = document.getElementById('gaze-nose');
      const sessionTitle = document.getElementById('session-title');
      const intermissionBar = document.getElementById('intermission-bar');
      const intermissionTitle = document.getElementById('intermission-title');
      const intermissionCountdown = document.getElementById('intermission-countdown');

      let cueSheet = null;
      let schedule = null;
      let syncOffset = 0;
      let syncMode = params.get('sync') === 'video' ? 'video' : 'wall';
      let lastCueIndex = -1;
      let lastLoadedHour = null;
      let streamLive = false;
      let breakMode = false;
      let countdownTimer = null;
      let debugOpen = DEBUG_URL;
      let hls = null;
      let playerStarted = false;
      let connectStartedAt = 0;
      const CONNECT_TIMEOUT_MS = 15000;
      let lastStreamLogKey = '';
      let scheduleLoggedOnce = false;

      function log(msg) {
        console.log('[ChaChu TV]', msg);
        if (!debugOpen) return;
        if (debugPanel.querySelector('.debug-hint')) {
          debugPanel.innerHTML = '';
        }
        const line = document.createElement('div');
        line.textContent = new Date().toLocaleTimeString() + ' — ' + msg;
        debugPanel.appendChild(line);
        debugPanel.scrollTop = debugPanel.scrollHeight;
      }

      function setDebugOpen(open) {
        debugOpen = open;
        debugPanel.classList.toggle('open', open);
        btnDebug.classList.toggle('active', open);
        btnDebug.textContent = open ? 'Hide log' : 'Technical log';
        if (open && !debugPanel.children.length) {
          debugPanel.innerHTML = '<div class="debug-hint">Connection and sync events appear here.</div>';
          log('Log opened');
          log('Stream URL: ' + streamURL);
        }
      }

      function formatClock(seconds) {
        const s = Math.max(0, Math.floor(seconds));
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const r = s % 60;
        if (h > 0) {
          return h + ':' + String(m).padStart(2, '0') + ':' + String(r).padStart(2, '0');
        }
        return String(m).padStart(2, '0') + ':' + String(r).padStart(2, '0');
      }

      function formatTime(seconds) {
        const s = Math.max(0, Math.floor(seconds));
        const m = Math.floor(s / 60);
        const r = s % 60;
        return m + ':' + String(r).padStart(2, '0');
      }

      function getScheduleTimezone() {
        return schedule?.timezone || Intl.DateTimeFormat().resolvedOptions().timeZone;
      }

      function getZonedParts(date, timeZone) {
        const parts = new Intl.DateTimeFormat('en-US', {
          timeZone: timeZone,
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false
        }).formatToParts(date);
        const pick = function (type) {
          const part = parts.find(function (p) { return p.type === type; });
          return part ? parseInt(part.value, 10) : 0;
        };
        return {
          year: pick('year'),
          month: pick('month'),
          day: pick('day'),
          hour: pick('hour') % 24,
          minute: pick('minute'),
          second: pick('second')
        };
      }

      function getElapsedSecondsInHour(nowMs, timeZone) {
        const z = getZonedParts(new Date(nowMs), timeZone);
        return z.minute * 60 + z.second;
      }

      function getCurrentHourKey(nowMs) {
        const z = getZonedParts(new Date(nowMs || Date.now()), getScheduleTimezone());
        return String(z.hour).padStart(2, '0');
      }

      function slotProgress(nowMs) {
        if (!schedule?.durationSeconds) return null;
        const tz = getScheduleTimezone();
        const elapsed = getElapsedSecondsInHour(nowMs || Date.now(), tz);
        if (elapsed >= 0 && elapsed < schedule.durationSeconds) {
          return {
            elapsed: elapsed,
            remaining: schedule.durationSeconds - elapsed
          };
        }
        return null;
      }

      function nextHourlySlot(nowMs) {
        const now = nowMs || Date.now();
        const tz = getScheduleTimezone();
        const z = getZonedParts(new Date(now), tz);
        const secsUntil = (59 - z.minute) * 60 + (60 - z.second);
        return new Date(now + secsUntil * 1000);
      }

      function getWallClockStreamSeconds() {
        if (!schedule?.durationSeconds) return null;

        const hourKey = getCurrentHourKey();
        const slot = slotProgress();

        if (schedule.slotStartEpoch && schedule.activeHour === hourKey) {
          const elapsed = Date.now() / 1000 - schedule.slotStartEpoch;
          if (elapsed >= 0 && elapsed < schedule.durationSeconds) {
            return elapsed;
          }
        }

        return slot ? slot.elapsed : null;
      }

      function getCueTimeSeconds() {
        if (syncMode === 'video' && streamLive && !isNaN(video.currentTime)) {
          return video.currentTime + syncOffset;
        }
        const wall = getWallClockStreamSeconds();
        if (wall !== null) return wall;
        if (streamLive && !isNaN(video.currentTime)) {
          return video.currentTime + syncOffset;
        }
        return null;
      }

      function resolveCuesUrl() {
        if (params.get('cues')) return params.get('cues');
        const hourKey = getCurrentHourKey();
        const slotEntry = schedule?.hourSlots?.[hourKey];
        if (slotEntry?.cues) return slotEntry.cues;
        return schedule?.cues || cuesUrl;
      }

      function resolveSubject() {
        const hourKey = getCurrentHourKey();
        const slotEntry = schedule?.hourSlots?.[hourKey];
        return slotEntry?.subject || schedule?.subject || cueSheet?.title || 'Guided kriya practice';
      }

      function breakProgress(nowMs) {
        if (!schedule?.durationSeconds) return null;
        const elapsed = getElapsedSecondsInHour(nowMs || Date.now(), getScheduleTimezone());
        if (elapsed >= schedule.durationSeconds && elapsed < 3600) {
          return {
            elapsed: elapsed - schedule.durationSeconds,
            remaining: 3600 - elapsed
          };
        }
        return null;
      }

      function isInBreakWindow(now) {
        return breakProgress(now) !== null;
      }

      function getBreakVideoUrl() {
        return schedule?.break?.video || '/tube/ShriHanumanChalisa.mp4';
      }

      function getBreakTitle() {
        return schedule?.break?.title || 'Intermission';
      }

      function getBreakSubject() {
        return schedule?.break?.subject || 'Intermission · next kriya on the hour';
      }

      function updateIntermissionBar() {
        const brk = breakProgress();
        if (!breakMode || !brk) {
          intermissionBar.hidden = true;
          return;
        }
        intermissionBar.hidden = false;
        intermissionTitle.textContent = getBreakTitle();
        const next = nextHourlySlot();
        intermissionCountdown.textContent = 'Next session in ' + formatClock(brk.remaining)
          + ' · ' + next.toLocaleTimeString([], {
            hour: 'numeric',
            minute: '2-digit',
            timeZone: getScheduleTimezone()
          });
      }

      function clearKriyaOverlay() {
        lastCueIndex = -1;
        instructionEl.classList.remove('visible');
        timerWrap.hidden = true;
        breath.classList.remove('active');
        gazeThirdEye.classList.remove('active');
        gazeNose.classList.remove('active');
      }

      function stopBreakPlayer() {
        if (!breakMode) return;
        breakMode = false;
        intermissionBar.hidden = true;
        resetPlayer();
      }

      async function ensureBreakPlayer() {
        if (!isInBreakWindow() || isInBroadcastWindow()) {
          stopBreakPlayer();
          return;
        }
        if (breakMode && video.src) return;

        resetPlayer();
        clearKriyaOverlay();
        breakMode = true;

        const url = getBreakVideoUrl();
        try {
          const res = await fetch(url, { method: 'HEAD', cache: 'no-store' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
        } catch (e) {
          log('Break video unavailable (' + url + '): ' + e.message);
          breakMode = false;
          showIdleOverlay('offline');
          return;
        }

        video.loop = schedule?.break?.loop !== false;
        video.muted = true;
        video.src = url;
        log('Intermission: ' + getBreakTitle());

        video.addEventListener('loadedmetadata', function onBreakReady() {
          video.removeEventListener('loadedmetadata', onBreakReady);
          waiting.classList.add('hidden');
          setLiveBadge('soon', 'Intermission');
          sessionTitle.textContent = schedule?.title || 'ChaChu TV';
          updateIntermissionBar();
          video.play().catch(function () {
            waiting.classList.remove('hidden');
            waiting.classList.remove('in-slot');
            waitingStatus.textContent = 'Intermission';
            waitingSubject.textContent = getBreakTitle();
            waitingDetail.textContent = 'Tap Unmute to play.';
          });
        }, { once: true });
      }

      function isInBroadcastWindow(now) {
        return slotProgress(now) !== null;
      }

      function setLiveBadge(state, label) {
        liveBadge.textContent = label;
        liveBadge.classList.remove('live', 'soon');
        if (state === 'live') liveBadge.classList.add('live');
        if (state === 'soon') liveBadge.classList.add('soon');
      }

      function showIdleOverlay(mode) {
        const subject = resolveSubject();
        waitingSubject.textContent = subject;

        if (mode === 'live') {
          waiting.classList.add('hidden');
          waiting.classList.remove('in-slot');
          intermissionBar.hidden = true;
          setLiveBadge('live', 'Live');
          return;
        }

        if (mode === 'break') {
          waiting.classList.add('hidden');
          setLiveBadge('soon', 'Intermission');
          updateIntermissionBar();
          return;
        }

        waiting.classList.remove('hidden');
        const now = Date.now();
        const inSlot = isInBroadcastWindow(now);
        waiting.classList.toggle('in-slot', !!inSlot);

        if (mode === 'connecting') {
          waitingStatus.textContent = 'Connecting';
          waitingCountdown.hidden = true;
          waitingCountdownLabel.hidden = true;
          waitingDetail.textContent = 'Joining the live broadcast…';
          setLiveBadge('soon', 'Connecting');
          return;
        }

        // Inside the hourly broadcast window — never show "Next session"
        if (inSlot) {
          const slot = slotProgress(now);
          waitingStatus.textContent = 'On air now';
          waitingCountdown.hidden = false;
          waitingCountdownLabel.hidden = false;
          waitingCountdown.textContent = formatClock(slot.remaining);
          waitingCountdownLabel.textContent = 'remaining in this session';
          waitingDetail.textContent = playerStarted
            ? 'Buffering live stream… tap Unmute if you hear no audio.'
            : 'Stream should be live — connecting…';
          setLiveBadge('soon', 'On air');
          intermissionBar.hidden = true;
          return;
        }

        if (isInBreakWindow(now) && !breakMode) {
          const brk = breakProgress(now);
          waitingStatus.textContent = 'Intermission';
          waitingSubject.textContent = getBreakTitle();
          waitingCountdown.hidden = false;
          waitingCountdownLabel.hidden = false;
          waitingCountdown.textContent = formatClock(brk.remaining);
          waitingCountdownLabel.textContent = 'until next kriya session';
          waitingDetail.textContent = getBreakSubject();
          setLiveBadge('soon', 'Intermission');
          return;
        }

        const next = nextHourlySlot(now);
        const secs = Math.max(0, Math.floor((next.getTime() - now) / 1000));
        waitingStatus.textContent = 'Next session';
        waitingCountdown.hidden = false;
        waitingCountdownLabel.hidden = false;
        waitingCountdown.textContent = formatClock(secs);
        waitingCountdownLabel.textContent = 'until ' + next.toLocaleTimeString([], {
          hour: 'numeric',
          minute: '2-digit',
          timeZone: getScheduleTimezone()
        });
        waitingDetail.textContent = schedule?.note || 'Broadcasts begin at the top of each hour.';
        setLiveBadge('soon', 'Offline');
        intermissionBar.hidden = true;
      }

      function tickCountdown() {
        if (isInBroadcastWindow()) {
          if (breakMode) stopBreakPlayer();
          maybeReloadCuesForHour();
          updateOverlay();
          if (!streamLive) showIdleOverlay('waiting');
          return;
        }
        if (isInBreakWindow()) {
          ensureBreakPlayer();
          updateIntermissionBar();
          return;
        }
        if (breakMode) stopBreakPlayer();
        clearKriyaOverlay();
        updateOverlay();
        if (!streamLive) showIdleOverlay('offline');
      }

      async function refreshSchedule() {
        await loadSchedule();
        await maybeReloadCuesForHour();
      }

      function startCountdownTicker() {
        if (countdownTimer) clearInterval(countdownTimer);
        countdownTimer = setInterval(tickCountdown, 1000);
        tickCountdown();
      }

      async function fetchPlaylistText(url) {
        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) {
          const err = new Error('HTTP ' + res.status);
          err.status = res.status;
          throw err;
        }
        return res.text();
      }

      /** SRS returns a master playlist first; segments live on ?hls_ctx=… URL */
      async function resolveHlsPlaylistUrl() {
        const text = await fetchPlaylistText(streamURL);

        if (text.includes('#EXT-X-STREAM-INF')) {
          const variantLine = text.split('\n').find(function (line) {
            return line.trim().startsWith('/live/') || line.trim().includes('hls_ctx=');
          });
          if (variantLine) {
            const resolved = new URL(variantLine.trim(), location.origin).href;
            log('SRS master playlist → ' + resolved);
            const media = await fetchPlaylistText(resolved);
            if (media.includes('#EXTINF') && media.includes('.ts')) {
              return resolved;
            }
            throw new Error('SRS variant has no segments yet');
          }
        }

        if (text.includes('#EXTINF') && text.includes('.ts')) {
          return streamURL;
        }

        throw new Error('No playable HLS segments in playlist');
      }

      function logStreamOnce(key, msg) {
        if (lastStreamLogKey === key) return;
        lastStreamLogKey = key;
        log(msg);
      }

      async function checkStreamLive(options) {
        const quiet = options && options.quiet;
        const inSlot = isInBroadcastWindow();
        try {
          const text = await fetchPlaylistText(streamURL);
          if (text.includes('#EXT-X-ENDLIST')) {
            logStreamOnce('ended', 'Stream check: playlist ended');
            return false;
          }
          if (text.includes('#EXT-X-STREAM-INF')) {
            logStreamOnce('live', 'Stream check: live (SRS master playlist)');
            return true;
          }
          if (text.includes('#EXTINF') && text.includes('.ts')) {
            logStreamOnce('live-media', 'Stream check: live (media playlist)');
            return true;
          }
          logStreamOnce('empty', inSlot ? 'Stream check: waiting for segments' : 'Stream check: idle');
          return false;
        } catch (e) {
          if (e.status === 404) {
            if (quiet || !inSlot) {
              return false;
            }
            logStreamOnce('404-slot', 'Stream check: not broadcasting yet (404)');
            return false;
          }
          logStreamOnce('err-' + e.message, 'Stream check failed: ' + e.message);
          return false;
        }
      }

      function resetPlayer() {
        if (hls) {
          hls.destroy();
          hls = null;
        }
        video.removeAttribute('src');
        video.loop = false;
        video.load();
        playerStarted = false;
        streamLive = false;
        breakMode = false;
        connectStartedAt = 0;
      }

      function activeCueIndex(t) {
        if (!cueSheet?.cues?.length) return -1;
        for (let i = cueSheet.cues.length - 1; i >= 0; i--) {
          if (t >= cueSheet.cues[i].at) return i;
        }
        return -1;
      }

      function applyCue(cue) {
        if (!cue) {
          instructionEl.classList.remove('visible');
          timerWrap.hidden = true;
          breath.classList.remove('active');
          gazeThirdEye.classList.remove('active');
          gazeNose.classList.remove('active');
          return;
        }

        instructionEl.textContent = cue.instruction;
        instructionEl.classList.add('visible');

        if (cue.timer) {
          timerWrap.hidden = false;
          timerMode.textContent = cue.timer.mode === 'countup' ? 'elapsed' : 'remaining';
        } else {
          timerWrap.hidden = true;
        }

        breath.classList.toggle('active', !!cue.breath);
        gazeThirdEye.classList.remove('active');
        gazeNose.classList.remove('active');
        if (cue.gaze === 'third-eye') gazeThirdEye.classList.add('active');
        if (cue.gaze === 'nose') gazeNose.classList.add('active');
      }

      function updateOverlay() {
        if (!cueSheet || breakMode || isInBreakWindow()) {
          if (lastCueIndex !== -1) clearKriyaOverlay();
          return;
        }
        const t = getCueTimeSeconds();
        if (t === null) return;

        const idx = activeCueIndex(t);
        if (idx !== lastCueIndex) {
          lastCueIndex = idx;
          applyCue(idx >= 0 ? cueSheet.cues[idx] : null);
        }
        const cue = idx >= 0 ? cueSheet.cues[idx] : null;
        if (!cue?.timer) return;

        const elapsed = t - cue.at;
        const total = cue.timer.seconds;
        let display;
        let fraction;

        if (cue.timer.mode === 'countup') {
          display = Math.min(elapsed, total);
          fraction = Math.min(elapsed / total, 1);
        } else {
          display = Math.max(total - elapsed, 0);
          fraction = Math.max(1 - elapsed / total, 0);
        }

        timerValue.textContent = formatTime(display);
        timerProgress.style.strokeDashoffset = String(CIRC * (1 - fraction));
      }

      async function maybeReloadCuesForHour() {
        const hourKey = getCurrentHourKey();
        if (hourKey === lastLoadedHour) return;
        lastLoadedHour = hourKey;
        await loadCues();
        lastCueIndex = -1;
        updateOverlay();
        log('Hour changed → cues for slot ' + hourKey);
      }

      function setupBreathTiming() {
        const inhale = cueSheet?.breath?.inhaleSeconds ?? 4;
        const exhale = cueSheet?.breath?.exhaleSeconds ?? 4;
        breathCircle.style.setProperty('--breath-duration', (inhale + exhale) + 's');
        breathCircle.style.animationDuration = (inhale + exhale) + 's';
      }

      async function loadSchedule() {
        try {
          const res = await fetch(scheduleUrl, { cache: 'no-store' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const prevEpoch = schedule?.slotStartEpoch;
          schedule = await res.json();
          if (schedule.title) sessionTitle.textContent = schedule.title;
          if (!scheduleLoggedOnce || prevEpoch !== schedule.slotStartEpoch) {
            log('Loaded schedule (tz: ' + getScheduleTimezone() + ')');
            scheduleLoggedOnce = true;
            if (prevEpoch !== schedule.slotStartEpoch && schedule.slotStartEpoch) {
              lastStreamLogKey = '';
            }
          }
        } catch (e) {
          schedule = {
            subject: 'Guided kriya practice',
            durationSeconds: 2462,
            timezone: 'America/Los_Angeles',
            slot: 'hourly'
          };
          if (!scheduleLoggedOnce) {
            log('Schedule unavailable, using defaults');
            scheduleLoggedOnce = true;
          }
        }
      }

      async function loadCues() {
        const url = resolveCuesUrl();
        try {
          const res = await fetch(url, { cache: 'no-store' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          cueSheet = await res.json();
          if (!schedule?.title && cueSheet.title) {
            sessionTitle.textContent = cueSheet.title;
          }
          setupBreathTiming();
          log('Loaded cues: ' + url);
        } catch (e) {
          log('Cues unavailable (' + url + '): ' + e.message);
          cueSheet = { title: 'ChaChu TV', cues: [] };
        }
      }

      function onStreamReady() {
        if (breakMode) return;
        streamLive = true;
        intermissionBar.hidden = true;
        showIdleOverlay('live');
        if (syncMode === 'wall') {
          log('Wall-clock sync: ' + formatTime(getWallClockStreamSeconds() || 0));
        }
        updateOverlay();
        video.play().catch(function () {
          streamLive = false;
          showIdleOverlay(isInBroadcastWindow() ? 'waiting' : 'offline');
          waitingDetail.textContent = 'Tap Unmute to start playback.';
        });
        log('Stream playing (sync: ' + syncMode + ')');
      }

      async function initHls() {
        if (playerStarted) return;
        playerStarted = true;
        connectStartedAt = Date.now();
        showIdleOverlay('connecting');
        log('Initializing HLS player');

        let sourceUrl = streamURL;
        try {
          sourceUrl = await resolveHlsPlaylistUrl();
        } catch (e) {
          log('Playlist resolve: ' + e.message);
          playerStarted = false;
          connectStartedAt = 0;
          showIdleOverlay(isInBroadcastWindow() ? 'waiting' : 'offline');
          return;
        }

        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
          hls = new Hls({
            debug: DEBUG_URL,
            enableWorker: true,
            lowLatencyMode: true,
            manifestLoadingMaxRetry: 6,
            levelLoadingMaxRetry: 6
          });

          hls.on(Hls.Events.MANIFEST_PARSED, function () {
            onStreamReady();
          });

          hls.on(Hls.Events.ERROR, function (_, data) {
            log('HLS: ' + data.type + ' — ' + data.details + (data.fatal ? ' (fatal)' : ''));
            if (!data.fatal) return;
            streamLive = false;
            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
              showIdleOverlay(isInBroadcastWindow() ? 'waiting' : 'connecting');
              hls.startLoad();
            } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
              hls.recoverMediaError();
            } else {
              resetPlayer();
              showIdleOverlay(isInBroadcastWindow() ? 'waiting' : 'offline');
            }
          });

          hls.loadSource(sourceUrl);
          hls.attachMedia(video);
          return;
        }

        if (video.canPlayType('application/vnd.apple.mpegurl')) {
          log('Using native HLS → ' + sourceUrl);
          video.src = sourceUrl;
          video.addEventListener('loadedmetadata', onStreamReady, { once: true });
          video.addEventListener('error', function () {
            log('Native HLS playback error');
            resetPlayer();
            showIdleOverlay(isInBroadcastWindow() ? 'waiting' : 'offline');
          }, { once: true });
          return;
        }

        playerStarted = false;
        connectStartedAt = 0;
        waitingDetail.textContent = 'This browser cannot play HLS.';
        log('HLS not supported');
      }

      async function ensurePlayer() {
        if (streamLive || breakMode) return;

        if (isInBreakWindow()) {
          await ensureBreakPlayer();
          return;
        }

        if (playerStarted && connectStartedAt && Date.now() - connectStartedAt > CONNECT_TIMEOUT_MS) {
          log('Connection timeout — retrying player');
          resetPlayer();
        }

        if (playerStarted) return;

        const inSlot = isInBroadcastWindow();
        const hourlyMode = (schedule?.slot || 'hourly') === 'hourly';

        if (!inSlot && hourlyMode) {
          showIdleOverlay('offline');
          return;
        }

        const live = inSlot ? true : await checkStreamLive({ quiet: true });
        if (live) {
          log(inSlot ? 'Broadcast window — starting player' : 'Stream detected — starting player');
          await initHls();
        } else if (!inSlot) {
          showIdleOverlay('offline');
        } else {
          showIdleOverlay('waiting');
        }
      }

      async function pollStream() {
        if (streamLive || breakMode) return;
        if (isInBreakWindow()) {
          await ensureBreakPlayer();
          return;
        }
        const inSlot = isInBroadcastWindow();
        const hourlyMode = (schedule?.slot || 'hourly') === 'hourly';
        if (!inSlot && hourlyMode) return;
        await ensurePlayer();
        if (!streamLive && !playerStarted) {
          showIdleOverlay(inSlot ? 'waiting' : 'offline');
        }
      }

      document.getElementById('btn-unmute').addEventListener('click', function () {
        video.muted = false;
        video.play().then(function () {
          if (breakMode) {
            waiting.classList.add('hidden');
            updateIntermissionBar();
            return;
          }
          streamLive = true;
          showIdleOverlay('live');
        }).catch(function () {});
      });

      document.getElementById('btn-sync').addEventListener('click', function () {
        syncMode = 'video';
        syncOffset = -video.currentTime;
        lastCueIndex = -1;
        log('Manual sync: following video at ' + formatTime(video.currentTime));
        updateOverlay();
      });

      btnDebug.addEventListener('click', () => {
        setDebugOpen(!debugOpen);
      });

      video.addEventListener('timeupdate', function () {
        if (syncMode === 'video') updateOverlay();
      });

      (async function boot() {
        log('Page loaded (sync mode: ' + syncMode + ')');
        await loadSchedule();
        lastLoadedHour = getCurrentHourKey();
        await loadCues();
        startCountdownTicker();
        setInterval(updateOverlay, 500);
        setInterval(refreshSchedule, 30000);
        await ensurePlayer();
        setInterval(pollStream, POLL_MS);
        if (DEBUG_URL) setDebugOpen(true);
        if (isInBroadcastWindow()) updateOverlay();
        else if (isInBreakWindow()) ensureBreakPlayer();
      })();
    })();
  </script>
</body>
</html>
