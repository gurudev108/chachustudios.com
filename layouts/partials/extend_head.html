<!-- TTS Player Assets - Direct injection -->
<link rel="stylesheet" href="{{ "css/tts-player.css" | relURL }}">
<script>
  // Immediate injection to ensure it loads
  (function() {
    // Add CSS
    if (!document.querySelector('link[href*="tts-player.css"]')) {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = '{{ "css/tts-player.css" | relURL }}';
      document.head.appendChild(link);
    }
    
    // Add JS
    if (!document.querySelector('script[src*="tts-player.js"]')) {
      const script = document.createElement('script');
      script.src = '{{ "js/tts-player.js" | relURL }}';
      script.defer = true;
      document.head.appendChild(script);
    }
  })();
</script>
