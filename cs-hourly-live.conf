# Hourly live stream schedule for `cs-hourly-live.sh`
#
# Keep paths relative to repo root (this folder) or use absolute paths.

# Default stream used for every hour unless overridden below.
DEFAULT_VIDEO="srv/tv/studios/92129/2026-06-23.mp4"
DEFAULT_AUDIO="srv/tv/studios/92129/2026-06-23a.WAV"

# Default cue sheet for the web overlay (path under srv/tv/).
DEFAULT_CUES="/kriya/default.json"
DEFAULT_SUBJECT="Stimulate Kundalini — guided kriya practice"

# Intermission after each hourly session (~20 min gap). Web path under srv/tv/.
BREAK_VIDEO="srv/tv/tube/ShriHanumanChalisa.mp4"
BREAK_TITLE="Shri Hanuman Chalisa"
BREAK_SUBJECT="Intermission · next kriya on the hour"

# RTMP ingest target.
RTMP_URL="rtmp://localhost/live/livestream"

# Optional per-hour overrides (24h clock), for future use:
# SLOT_09_VIDEO="srv/tv/studios/92129/special-9am-video.mp4"
# SLOT_09_AUDIO="srv/tv/studios/92129/special-9am-audio.wav"
